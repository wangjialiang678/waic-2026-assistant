  .side-hero { padding: clamp(3rem, 8vw, 5rem) 0 2rem; text-align: center; background: linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 100%); }

    </div>

</footer>

<script>
(async function () {
  const container = document.getElementById('side-events-list');
  if (!container) return;
  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
  }
  try {
    const res = await fetch('/data/side-events.json');
    if (!res.ok) throw new Error('status ' + res.status);
    const data = await res.json();
    const items = data.items || [];
    if (items.length === 0) {
      container.innerHTML = '<div class="side-empty">暂无边会信息，请关注 WAIC 官方更新。</div>';
      return;
    }
    container.innerHTML = items.map(item => `
      <div class="side-card">
        <h3>${esc(item.title)}</h3>
        <p>${esc(item.summary)}</p>
        <a href="${esc(item.url)}" target="_blank" rel="noopener">查看详情 →</a>
      </div>
    `).join('');
  } catch (e) {
    container.innerHTML = '<div class="side-empty">加载失败，请刷新重试。</div>';
  }
})();
</script>


<button type="button" class="ai-assistant-fab" id="ai-assistant-fab" aria-label="AI 助手">

</button>

    <form class="ai-assistant-form" id="ai-assistant-form">
      <input type="text" id="ai-assistant-input" placeholder="输入你的问题…" autocomplete="off">
      <button type="submit">发送</button>
    </form>
    <div class="ai-assistant-answer" id="ai-assistant-answer">
      <p>有什么可以帮你的？</p>

  </div>
</div>

<script src="/assets/ai-assistant.js"></script>
