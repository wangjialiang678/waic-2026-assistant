  .exhibitors-hero { padding: clamp(3rem, 8vw, 5rem) 0 2rem; text-align: center; background: linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 100%); }
  .exhibitors-hero h1 { font-size: clamp(2rem, 5vw, 3rem); font-weight: 600; margin-bottom: 0.6rem; }
  .exhibitors-hero p { color: var(--text-soft); max-width: 50ch; margin: 0 auto; }
  .exhibitors-toolbar { max-width: var(--max-w); margin: 0 auto; padding: 1.5rem var(--gutter); display: flex; gap: 0.75rem; flex-wrap: wrap; }
  .exhibitors-toolbar input { flex: 1; min-width: 220px; padding: 0.65rem 1rem; border: 1px solid var(--border); border-radius: var(--radius-pill, 999px); background: var(--surface-elevated); color: var(--text); font-family: var(--font-sans); }
  .exhibitors-toolbar select { padding: 0.65rem 1rem; border: 1px solid var(--border); border-radius: var(--radius-pill, 999px); background: var(--surface-elevated); color: var(--text); font-family: var(--font-sans); }
  .exhibitors-grid { max-width: var(--max-w); margin: 0 auto; padding: 0 var(--gutter) clamp(3rem, 8vw, 5rem); display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.25rem; }
  .exhibitor-card { background: var(--surface-elevated); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; transition: transform 0.2s, box-shadow 0.2s; }
  .exhibitor-card:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(0,0,0,0.08); }
  .exhibitor-booth { font-size: 0.78rem; font-weight: 700; color: var(--accent-blue); margin-bottom: 0.4rem; }
  .exhibitor-name { font-size: 1.15rem; font-weight: 600; margin-bottom: 0.4rem; }
  .exhibitor-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
  .exhibitor-tag { font-size: 0.75rem; padding: 0.2rem 0.5rem; border-radius: 999px; background: rgba(78,107,255,0.1); color: var(--accent-blue); }
  .exhibitor-profile { font-size: 0.92rem; color: var(--text-soft); line-height: 1.6; margin-bottom: 1rem; }
  .exhibitor-link { font-size: 0.85rem; color: var(--accent-blue); text-decoration: none; }
  .exhibitor-empty { grid-column: 1 / -1; text-align: center; padding: 3rem; color: var(--text-mute); }
  .exhibitor-stats { max-width: var(--max-w); margin: 0 auto; padding: 0 var(--gutter) 1.5rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; }
  .exhibitor-stat { background: var(--surface-elevated); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; text-align: center; }
  .exhibitor-stat .n { font-size: 1.6rem; font-weight: 700; color: var(--accent-blue); }
  .exhibitor-stat .l { font-size: 0.85rem; color: var(--text-mute); margin-top: 0.3rem; }

<script>
(function () {
  let DATA = { exhibitors: [], halls: [], industries: [] };

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
  }

  function renderStats() {
    const container = document.getElementById('exhibitor-stats');
    if (!container) return;
    const total = DATA.exhibitors.length;
    const hallCounts = {};
    DATA.exhibitors.forEach(e => { hallCounts[e.hall] = (hallCounts[e.hall] || 0) + 1; });
    const topHall = Object.entries(hallCounts).sort((a, b) => b[1] - a[1])[0];

    container.innerHTML = `
      <div class="exhibitor-stat"><div class="n">${total}</div><div class="l">入口</div></div>
      <div class="exhibitor-stat"><div class="n">${DATA.halls.length}</div><div class="l">展馆</div></div>
      <div class="exhibitor-stat"><div class="n">${DATA.industries.length}</div><div class="l">行业</div></div>
      ${topHall ? `<div class="exhibitor-stat"><div class="n">${topHall[1]}</div><div class="l">${esc(topHall[0])}</div></div>` : ''}
    `;
  }

  function populateFilters() {
    const hallEl = document.getElementById('exhibitor-hall');
    const indEl = document.getElementById('exhibitor-industry');
    if (hallEl) hallEl.innerHTML = '<option value="">全部展馆</option>' + (DATA.halls || []).map(h => `<option value="${esc(h)}">${esc(h)}</option>`).join('');
    if (indEl) indEl.innerHTML = '<option value="">全部类型</option>' + (DATA.industries || []).map(i => `<option value="${esc(i)}">${esc(i)}</option>`).join('');
  }

  function renderItems() {
    const grid = document.getElementById('exhibitors-grid');
    const q = document.getElementById('exhibitor-search')?.value.toLowerCase().trim() || '';
    const hall = document.getElementById('exhibitor-hall')?.value || '';
    const industry = document.getElementById('exhibitor-industry')?.value || '';

    const filtered = (DATA.exhibitors || []).filter(e => {
      const matchQ = !q || (e.name || '').toLowerCase().includes(q) || (e.booth || '').toLowerCase().includes(q) || (e.profile || '').toLowerCase().includes(q);
      const matchHall = !hall || e.hall === hall;
      const matchInd = !industry || (e.industry || '') === industry;
      return matchQ && matchHall && matchInd;
    });

    if (filtered.length === 0) {
      grid.innerHTML = '<div class="exhibitor-empty">暂无匹配的展区或参展入口。公司级名录正在补充中，可先查看 <a href="https://www.worldaic.com.cn/" target="_blank">WAIC 官网</a>。</div>';
      return;
    }

    grid.innerHTML = filtered.map(e => `
      <div class="exhibitor-card">
        <div class="exhibitor-booth">${esc(e.booth || '展台待定')}</div>
        <div class="exhibitor-name">${esc(e.name)}</div>
        <div class="exhibitor-tags">
          ${e.industry ? `<span class="exhibitor-tag">${esc(e.industry)}</span>` : ''}
          ${e.hall ? `<span class="exhibitor-tag">${esc(e.hall)}</span>` : ''}
        </div>
        <div class="exhibitor-profile">${esc(e.profile || '')}</div>
        ${e.url ? `<a class="exhibitor-link" href="${esc(e.url)}" target="_blank" rel="noopener">访问官网 →</a>` : ''}
      </div>
    `).join('');
  }

  async function load() {
    try {
      const res = await fetch('/data/exhibitors.json');
      if (!res.ok) throw new Error('status ' + res.status);
      DATA = await res.json();
      renderStats();
      populateFilters();
      renderItems();
    } catch (e) {
      document.getElementById('exhibitors-grid').innerHTML = '<div class="exhibitor-empty">加载失败，请刷新重试。</div>';
    }
  }

  document.getElementById('exhibitor-search')?.addEventListener('input', renderItems);
  document.getElementById('exhibitor-hall')?.addEventListener('change', renderItems);
  document.getElementById('exhibitor-industry')?.addEventListener('change', renderItems);

  load();
})();
</script>
